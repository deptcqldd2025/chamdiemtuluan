<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chấm Điểm Bài Thi - VDC Safety</title>
    <style>
        body { font-family: sans-serif; background: #eef2f3; margin: 0; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; height: 100vh; box-sizing: border-box;}
        .panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column;}
        h3 { margin-top: 0; color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px;}
        textarea { flex: 1; width: 100%; padding: 10px; font-family: monospace; border: 1px solid #ccc; margin-bottom: 15px; resize: none; box-sizing: border-box; min-height: 250px;}
        button { padding: 15px; background: #007bff; color: white; border: none; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.2s;}
        button:disabled { background: #999; cursor: not-allowed;}
        button:hover:not(:disabled) { background: #0056b3; }
        
        #preview { background: #f9f9f9; padding: 15px; border: 1px solid #ddd; margin-bottom: 15px; font-size: 14px; min-height: 100px; border-radius: 5px;}
        
        /* Cấu hình bảng dữ liệu */
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; vertical-align: middle; }
        th { background-color: #f2f2f2; position: sticky; top: 0;}
        .table-container { overflow-y: auto; flex: 1; border: 1px solid #ddd; border-radius: 5px;}
        
        /* Nút copy nhỏ trong bảng */
        .btn-copy-small { background: #28a745; color: white; border: none; border-radius: 4px; padding: 5px 8px; cursor: pointer; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; width: 100%;}
        .btn-copy-small:hover { background: #218838; }
    </style>
</head>
<body>

    <div class="panel">
        <h3>1. Dán JSON từ Gem</h3>
        
        <textarea id="jsonInput" placeholder='{\n  "so_bao_danh": "123",\n  "ket_qua_cham": "...",\n  "so_diem": 8.0\n}' oninput="previewData()"></textarea>
        
        <div id="preview">Nhập JSON hợp lệ để xem trước...</div>
        <div id="status" style="margin-bottom: 10px; font-weight: bold; text-align: center; min-height: 20px;"></div>
        <button id="btnSave" onclick="saveGrade()" disabled>LƯU KẾT QUẢ VÀO CƠ SỞ DỮ LIỆU</button>
    </div>

    <div class="panel">
        <h3>2. Danh sách bài thi (Từ Google Sheet)</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th width="70">SBD</th>
                        <th width="60">Điểm</th>
                        <th>Bài làm</th>
                        <th width="50" style="text-align:center;">Lệnh</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="4" style="text-align:center;">Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>
        <button onclick="loadSheetData()" style="margin-top: 15px; background: #17a2b8;">LÀM MỚI DANH SÁCH</button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz203WVeZtQU5qH1kO2vhZ5uukbWH8QpEPcPqFBOwVTn0Go1mxnfoGzXwXKyrpxBRxvpA/exec";
        let parsedJSON = null;

        // --- Logic tạo lệnh Prompt tại từng dòng ---
        function copyRowPrompt(sbd, btn) {
            const promptText = `@Google Drive tìm và đọc file ${sbd}.pdf`;
            navigator.clipboard.writeText(promptText).then(() => {
                const originalText = btn.innerText;
                btn.innerText = "✅";
                btn.style.background = "#20c997";
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = "#28a745";
                }, 1500);
            }).catch(err => {
                alert("Trình duyệt từ chối quyền copy. Vui lòng kiểm tra lại cấu hình.");
            });
        }

        // --- Logic xử lý dữ liệu JSON ---
        function previewData() {
            const val = document.getElementById('jsonInput').value.trim();
            const preview = document.getElementById('preview');
            const btn = document.getElementById('btnSave');
            document.getElementById('status').innerText = "";
            
            if (!val) { preview.innerHTML = "Nhập JSON hợp lệ để xem trước..."; btn.disabled = true; return; }
            
            try {
                parsedJSON = JSON.parse(val);
                if (parsedJSON.so_bao_danh && parsedJSON.so_diem !== undefined) {
                    preview.innerHTML = `
                        <b>SBD:</b> ${parsedJSON.so_bao_danh}<br>
                        <b>Điểm:</b> <span style="color:red; font-size:16px;"><b>${parsedJSON.so_diem}</b></span><br>
                        <b>Chi tiết:</b> ${parsedJSON.ket_qua_cham}
                    `;
                    btn.disabled = false;
                } else {
                    throw new Error();
                }
            } catch (e) {
                preview.innerHTML = "<span style='color:red;'>Lỗi cú pháp JSON. Vui lòng kiểm tra lại.</span>";
                btn.disabled = true;
            }
        }

        async function saveGrade() {
            const btn = document.getElementById('btnSave');
            const status = document.getElementById('status');
            btn.disabled = true;
            status.innerText = "Đang đồng bộ dữ liệu...";
            status.style.color = "blue";

            try {
                const payload = { action: "save_grade", ...parsedJSON };
                const res = await fetch(GAS_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(payload) 
                });
                const result = await res.json();
                
                if (result.status === "success") {
                    status.innerText = "Lưu điểm thành công!";
                    status.style.color = "green";
                    
                    // Reset giao diện
                    document.getElementById('jsonInput').value = "";
                    document.getElementById('preview').innerHTML = "Nhập JSON hợp lệ để xem trước...";
                    
                    // Tải lại bảng bên phải để cập nhật trạng thái (ẩn nút copy của bài vừa chấm)
                    loadSheetData();
                } else {
                    throw new Error(result.message);
                }
            } catch (e) {
                status.innerText = "LỖI: " + e.message;
                status.style.color = "red";
                btn.disabled = false;
            }
        }

        // --- Logic hiển thị danh sách từ Google Sheet ---
        async function loadSheetData() {
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                let html = "";
                data.forEach(item => {
                    const isGraded = item.trang_thai === "Đã chấm";
                    const textColor = isGraded ? "red" : "#888";
                    const diemSo = isGraded ? item.diem : "⏳";
                    
                    // Cột Lệnh: Nếu đã chấm thì để trống, chưa chấm thì hiện nút copy
                    const actionHtml = isGraded ? "" : `<button class="btn-copy-small" onclick="copyRowPrompt('${item.sbd}', this)" title="Copy lệnh cho SBD ${item.sbd}">📋</button>`;
                    
                    html += `<tr>
                        <td><b>${item.sbd}</b></td>
                        <td style="color:${textColor}; font-weight:bold; text-align:center;">${diemSo}</td>
                        <td><a href="${item.link}" target="_blank">Mở PDF</a></td>
                        <td style="text-align:center; padding:4px;">${actionHtml}</td>
                    </tr>`;
                });
                document.getElementById('tableBody').innerHTML = html || "<tr><td colspan='4' style='text-align:center;'>Chưa có dữ liệu.</td></tr>";
            } catch (e) {
                document.getElementById('tableBody').innerHTML = "<tr><td colspan='4' style='color:red; text-align:center;'>Lỗi kết nối cơ sở dữ liệu.</td></tr>";
            }
        }
        
        // Khởi động
        loadSheetData();
    </script>
</body>
</html>
